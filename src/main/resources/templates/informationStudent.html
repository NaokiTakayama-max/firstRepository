<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>受講生詳細</title>
</head>
<body>
<h1>受講生詳細</h1>
<div>
  <p>ID: <span th:text="${studentDetail.student.studentId}"></span></p>
  <p>名前: <span th:text="${studentDetail.student.name}"></span></p>
  <p>カナ名: <span th:text="${studentDetail.student.furigana}"></span></p>
  <p>ニックネーム: <span th:text="${studentDetail.student.nickname}"></span></p>
  <p>メール: <span th:text="${studentDetail.student.mailAddress}"></span></p>
  <p>地域: <span th:text="${studentDetail.student.region}"></span></p>
  <p>年齢: <span th:text="${studentDetail.student.age}"></span></p>
  <p>性別: <span th:text="${studentDetail.student.gender}"></span></p>
  <p>備考: <span th:text="${studentDetail.student.remark}"></span></p>
</div>

<h2>受講コース一覧</h2>
<table border="1">
  <tr>
    <th>コース名</th>
    <th>開始日</th>
    <th>終了日</th>
  </tr>
  <tr th:each="course : ${studentDetail.studentsCourses}">
    <td th:text="${course.courseName}"></td>
    <td th:text="${course.startDate}"></td>
    <td th:text="${course.plannedEndDate}"></td>
  </tr>
</table>

<a href="/studentList">一覧に戻る</a>

</body>
</html>
