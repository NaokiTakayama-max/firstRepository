<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org ">
<head>
  <title>受講生一覧</title>
</head>
<body>
<h1>受講生一覧</h1>
<table border="1">
  <thead>
  <tr>
    <th>ID</th>
    <th>名前</th>
    <th>カナ名</th>
    <th>ニックネーム</th>
    <th>メールアドレス</th>
    <th>地域</th>
    <th>年齢</th>
    <th>性別</th>
    <th>備考</th>
  </tr>
  </thead>
  <tbody>

  <tr th:each="studentDetail : ${studentList}">
    <td th:text="${studentDetail.student.studentId}">AA</td>
    <td th:text="${studentDetail.student.name}">髙山直紀</td>
    <td th:text="${studentDetail.student.furigana}">タカヤマナオキ</td>
    <td th:text="${studentDetail.student.nickname}">直紀</td>
    <td th:text="${studentDetail.student.mailAddress}"></td>
    <td th:text="${studentDetail.student.region}">aa県bb市cc区dd町</td>
    <td th:text="${studentDetail.student.age}">23</td>
    <td th:text="${studentDetail.student.gender}">男性</td>
    <td th:text="${studentDetail.student.remark}">特になし</td>
  </tr>
  </tbody>
</table>
</body>
</html>
